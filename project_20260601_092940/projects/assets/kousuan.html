<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小学生口算打印</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    padding: 40px 24px;
    display: flex;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 960px; width: 100%; }

  /* ── Header ── */
  .header {
    background: #ffffff;
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid rgba(0,0,0,0.06);
  }
  .header h1 { font-size: 24px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.3px; }
  .header p { font-size: 14px; color: #86868b; margin-top: 3px; font-weight: 400; }
  .header-badge {
    font-size: 12px; font-weight: 500; color: #86868b;
    background: #f5f5f7; padding: 6px 14px; border-radius: 20px;
    border: 1px solid rgba(0,0,0,0.04);
  }

  /* ── Controls ── */
  .controls {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    gap: 16px 28px;
  }
  .control-group { display: flex; flex-direction: column; gap: 6px; }
  .control-group > label {
    font-size: 11px; font-weight: 600; color: #86868b;
    letter-spacing: 0.5px; text-transform: uppercase;
  }

  /* ── Segmented controls ── */
  .grade-btns { display: flex; border-radius: 10px; overflow: hidden; border: 1px solid #d2d2d7; }
  .grade-btn {
    padding: 7px 16px; border: none; border-right: 1px solid #d2d2d7;
    background: #ffffff; font-size: 13px; font-weight: 500;
    color: #1d1d1f; cursor: pointer; transition: all 0.15s;
    font-family: inherit;
  }
  .grade-btn:last-child { border-right: none; }
  .grade-btn:hover { background: #f5f5f7; }
  .grade-btn.active { background: #0071e3; color: #ffffff; }

  .count-btns { display: flex; align-items: center; border-radius: 10px; overflow: hidden; border: 1px solid #d2d2d7; }
  .count-btn, .page-btn {
    padding: 7px 14px; border: none; border-right: 1px solid #d2d2d7;
    background: #ffffff; font-size: 13px; font-weight: 500;
    color: #1d1d1f; cursor: pointer; transition: all 0.15s;
    font-family: inherit;
  }
  .count-btn:last-child, .page-btn:last-child { border-right: none; }
  .count-btn:hover, .page-btn:hover { background: #f5f5f7; }
  .count-btn.active, .page-btn.active { background: #0071e3; color: #ffffff; }

  .count-input {
    width: 56px; padding: 7px 8px;
    border: 1px solid #d2d2d7; border-radius: 10px;
    font-size: 13px; text-align: center; font-weight: 500;
    color: #1d1d1f; font-family: inherit; margin-left: 6px;
  }
  .count-input:focus { outline: none; border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,0.15); }

  /* ── Type pills ── */
  .types-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .type-btn {
    padding: 6px 14px; border: 1px solid #d2d2d7; border-radius: 20px;
    background: #ffffff; font-size: 13px; color: #1d1d1f;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .type-btn:hover { border-color: #0071e3; color: #0071e3; }
  .type-btn.active { background: #0071e3; border-color: #0071e3; color: #ffffff; }

  /* ── Action buttons ── */
  .actions { display: flex; gap: 8px; margin-left: auto; align-items: flex-end; }
  .btn {
    padding: 10px 26px; border: none; border-radius: 24px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .btn-gen { background: #0071e3; color: #ffffff; }
  .btn-gen:hover { background: #0077ed; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,113,227,0.35); }
  .btn-print { background: #1d1d1f; color: #ffffff; }
  .btn-print:hover { background: #2d2d2f; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }

  /* ── Paper (question sheet) ── */
  .paper {
    background: #ffffff;
    border-radius: 16px;
    padding: 32px 28px;
    border: 1px solid rgba(0,0,0,0.06);
    margin-bottom: 20px;
  }
  .paper-header {
    text-align: center;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1.5px solid #1d1d1f;
  }
  .paper-header .page-num {
    float: right; font-size: 12px; color: #c7c7cc; font-weight: 400;
  }
  .paper-header h2 { font-size: 20px; color: #1d1d1f; letter-spacing: 2px; font-weight: 600; }
  .paper-meta {
    display: flex; justify-content: center; gap: 28px;
    margin-top: 6px; font-size: 13px; color: #86868b;
  }
  .paper-meta .blank {
    display: inline-block; border-bottom: 1px solid #86868b;
    min-width: 72px; margin-left: 2px;
  }

  /* ── Question grid ── */
  .questions { display: grid; gap: 6px 14px; }
  .questions.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .questions.cols-5 { grid-template-columns: repeat(5, 1fr); }

  .question {
    padding: 7px 4px;
    border-bottom: 1px dashed #e8e8ed;
    display: flex; align-items: baseline; gap: 4px;
    font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
    color: #1d1d1f;
  }
  .question .idx {
    width: 28px; display: inline-flex; justify-content: flex-end;
    font-size: 10px; color: #c7c7cc; flex-shrink: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  }

  /* ── Fractions ── */
  .frac {
    display: inline-flex; flex-direction: column; align-items: center;
    vertical-align: middle; line-height: 1.15; margin: 0 1px;
  }
  .frac .num { padding: 0 4px; border-bottom: 1.5px solid #1d1d1f; color: #1d1d1f; }
  .frac .den { padding: 0 4px; color: #1d1d1f; }

  .q-text { display: inline-flex; align-items: center; justify-content: center; flex: 1; flex-wrap: wrap; gap: 0; }

  /* ── Compact mode for fraction/text-heavy questions ── */
  .paper.compact .question { padding: 3px 3px; }
  .paper.compact .questions { gap: 3px 10px; }
  .paper.compact .frac .num,
  .paper.compact .frac .den { padding: 0 2px; }

  .no-questions { text-align: center; color: #c7c7cc; padding: 60px 0; font-size: 14px; }

  /* ── Footer ── */
  
  /* ── Multi-page: print page breaks ── */
  .paper-page { page-break-after: always; }

  @media print {
    body { background: #ffffff; padding: 0; }
    .header, .controls, .btn, .footer { display: none !important; }
    .paper { box-shadow: none; border-radius: 0; padding: 20px 0; margin-bottom: 0; border: none; min-height: 100vh; display: flex; flex-direction: column; }
    .paper-page { page-break-after: always; }
    .paper:last-child { page-break-after: auto; }
    .paper-header { margin-bottom: 12px; padding-bottom: 10px; }
    .paper-header h2 { font-size: 18px; }
    .paper-header .page-num { display: none; }
    .paper-meta { font-size: 12px; gap: 20px; }
    .question { border-bottom-color: #d2d2d7; }
    .questions { flex: 1; align-content: space-evenly; }
    @page { margin: 12mm; size: A4; }
  }

  @media (max-width: 700px) {
    body { padding: 12px; }
    .header { padding: 20px; flex-direction: column; text-align: center; gap: 10px; }
    .controls { padding: 16px; }
    .actions { margin-left: 0; width: 100%; }
    .actions .btn { flex: 1; text-align: center; }
    .paper { padding: 16px; }
    .questions.cols-4, .questions.cols-5 { grid-template-columns: repeat(3, 1fr); }
    .paper-meta { flex-wrap: wrap; gap: 10px; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div>
      <h1>口算练习</h1>
      <p>选择年级与题型，一键生成可打印的口算题</p>
    </div>
    <div class="header-badge">如有建议请联系82127972@coze.email</div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>年级</label>
      <div class="grade-btns" id="gradeBtns"></div>
    </div>
    <div class="control-group">
      <label>题型</label>
      <div class="types-grid" id="typesContainer"></div>
    </div>
    <div class="control-group">
      <label>每题数</label>
      <div class="count-btns">
        <button class="count-btn" data-count="10">10</button>
        <button class="count-btn" data-count="20">20</button>
        <button class="count-btn" data-count="40">40</button>
        <button class="count-btn active" data-count="80">80</button>
        <button class="count-btn" data-count="100">100</button>
        <input class="count-input" id="countInput" type="number" value="80" min="10" max="200" placeholder="自定义">
      </div>
    </div>
    <div class="control-group">
      <label>页数</label>
      <div class="count-btns">
        <button class="page-btn active" data-pages="1">1</button>
        <button class="page-btn" data-pages="2">2</button>
        <button class="page-btn" data-pages="5">5</button>
        <button class="page-btn" data-pages="10">10</button>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-gen" onclick="generate()">生成题目</button>
      <button class="btn btn-print" onclick="window.print()">打印 / PDF</button>
    </div>
  </div>

  <div id="paperContainer">
    <div class="paper" id="paper">
      <div class="paper-header">
        <h2 id="paperTitle">口算练习题</h2>
        <div class="paper-meta">
          <span>姓名: <span class="blank"></span></span>
          <span>日期: <span class="blank"></span></span>
          <span>用时: <span class="blank"></span></span>
          <span>对题: <span class="blank"></span></span>
        </div>
      </div>
      <div class="questions cols-4" id="questionsContainer">
        <div class="no-questions">请选择年级和题型，然后点击生成题目</div>
      </div>
    </div>
  </div>

</div>


<script>
var typeDefs = {
  1: [
    { id: 'g1a10', label: '10以内加减', gen: function() { return genAddSub(1, 10); } },
    { id: 'g1a20', label: '20以内加减', gen: function() { return genAddSub(1, 20); } },
    { id: 'g1c',   label: '连加连减', gen: function() { return genChain(1, 20, 3); } },
  ],
  2: [
    { id: 'g2a100', label: '100以内加减', gen: function() { return genAddSub(1, 100); } },
    { id: 'g2mul',  label: '表内乘除', gen: function() { return genTableMulDiv(); } },
    { id: 'g2mix',  label: '混合运算', gen: function() { return genMix2(); } },
  ],
  3: [
    { id: 'g3a',  label: '万以内加减', gen: function() { return genAddSub(10, 9999); } },
    { id: 'g3md', label: '多位数乘除', gen: function() { return genMulDiv(2, 99); } },
    { id: 'g3f',  label: '分数初步', gen: function() { return genSimpleFrac(); } },
  ],
  4: [
    { id: 'g4mul', label: '三位数x两位数', gen: function() { return genMul(100, 999, 10, 99); } },
    { id: 'g4div', label: '两位数除法', gen: function() { return genDiv(100, 9999, 10, 99); } },
    { id: 'g4dec', label: '小数加减', gen: function() { return genDecAddSub(1, 2); } },
  ],
  5: [
    { id: 'g5dm', label: '小数乘除', gen: function() { return genDecMulDiv(); } },
    { id: 'g5fa', label: '分数加减', gen: function() { return genFracArith('+-'); } },
    { id: 'g5eq', label: '解方程', gen: function() { return genEquation(10); } },
  ],
  6: [
    { id: 'g6fm', label: '分数乘除', gen: function() { return genFracArith('×÷'); } },
    { id: 'g6p',  label: '百分数', gen: function() { return genPercent(); } },
    { id: 'g6r',  label: '比例', gen: function() { return genRatio(); } },
  ],
};

var typeNames = ['','一年级','二年级','三年级','四年级','五年级','六年级'];

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function gcd(a, b) { return b ? gcd(b, a % b) : a; }

function properFrac(maxDen) {
  for (var _ = 0; _ < 100; _++) {
    var d = rand(2, maxDen);
    var n = rand(1, d - 1);
    if (gcd(n, d) === 1) return { n: n, d: d };
  }
  return { n: 1, d: 2 };
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = rand(0, i);
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function fracHTML(n, d) {
  return '<span class="frac"><span class="num">' + n + '</span><span class="den">' + d + '</span></span>';
}

function fmtFrac(n, d) {
  if (n >= d) return n + '/' + d;
  return fracHTML(n, d);
}

// ============ 题型生成器 ============

function genAddSub(min, max) {
  if (Math.random() < 0.5) {
    var result = rand(Math.max(min * 2, 2), max);
    var a = rand(min, Math.max(min, result - min));
    var b = result - a;
    return { html: a + ' + ' + b + ' =', answer: result };
  } else {
    var a = rand(min + 1, max);
    var b = rand(min, a - 1);
    return { html: a + ' - ' + b + ' =', answer: a - b };
  }
}

function genChain(min, max, count) {
  for (var attempt = 0; attempt < 100; attempt++) {
    var nums = [];
    var total = 0;
    var valid = true;
    for (var i = 0; i < count; i++) {
      var v = rand(Math.max(min, 1), Math.min(max, Math.floor(max * 0.7)));
      nums.push(v);
      total += v;
    }
    var expr = '', running = nums[0];
    if (running > max) continue;
    for (var i = 1; i < count; i++) {
      var op = Math.random() < 0.5 ? '+' : '-';
      if (op === '+' && running + nums[i] > max) { valid = false; break; }
      if (op === '-' && running - nums[i] < 0) { valid = false; break; }
      expr += nums[i-1] + ' ' + op + ' ';
      running = op === '+' ? running + nums[i] : running - nums[i];
    }
    if (valid && running >= 0 && running <= max) {
      return { html: expr + nums[count-1] + ' =', answer: running };
    }
  }
  var _a = rand(1, 10), _b = rand(1, 10);
  return { html: _a + ' + ' + _b + ' =', answer: _a + _b };
}

function genMulDiv(min, max) {
  var a = rand(min, max);
  var bMax = Math.min(max, Math.floor(max / 2));
  if (bMax < 1) bMax = 1;
  var b = rand(1, Math.max(1, bMax));
  if (Math.random() < 0.5) {
    return { html: a + ' x ' + b + ' =', answer: a * b };
  } else {
    return { html: (a * b) + ' / ' + b + ' =', answer: a };
  }
}

function genTableMulDiv() {
  var a = rand(1, 9);
  var b = rand(1, 9);
  if (Math.random() < 0.5) {
    return { html: a + ' x ' + b + ' =', answer: a * b };
  } else {
    return { html: (a * b) + ' ÷ ' + b + ' =', answer: a };
  }
}

function genMix2() {
  var r = Math.random();
  if (r < 0.5) {
    var a = rand(5, 30), b = rand(1, 30);
    var sum = a + b;
    if (sum > 100) { a = rand(5, 50); b = rand(1, 50); sum = a + b; }
    var c = rand(1, Math.min(sum, 50));
    return { html: a + ' + ' + b + ' - ' + c + ' =', answer: sum - c };
  }
  var ma = rand(2, 9), mb = rand(2, 9);
  var product = ma * mb;
  if (r < 0.75) {
    var addC = rand(1, Math.min(30, 100 - product));
    return { html: ma + ' x ' + mb + ' + ' + addC + ' =', answer: product + addC };
  } else {
    var subC = rand(1, Math.min(20, product));
    return { html: ma + ' x ' + mb + ' - ' + subC + ' =', answer: product - subC };
  }
}

function genMul(aMin, aMax, bMin, bMax) {
  var a = rand(aMin, aMax), b = rand(bMin, bMax);
  return { html: a + ' x ' + b + ' =', answer: a * b };
}

function genDiv(aMin, aMax, bMin, bMax) {
  var b = rand(bMin, bMax);
  var qMin = Math.ceil(aMin / b);
  var qMax = Math.floor(aMax / b);
  if (qMin > qMax) qMin = qMax;
  var q = rand(qMin, qMax);
  return { html: (b * q) + ' / ' + b + ' =', answer: q };
}

function genDecAddSub(places) {
  var a = parseFloat((Math.random() * 100).toFixed(places));
  var b = parseFloat((Math.random() * 100).toFixed(places));
  if (Math.random() < 0.5) {
    return { html: a.toFixed(places) + ' + ' + b.toFixed(places) + ' =', answer: (a + b).toFixed(places) };
  } else {
    if (a < b) { var t = a; a = b; b = t; }
    return { html: a.toFixed(places) + ' - ' + b.toFixed(places) + ' =', answer: (a - b).toFixed(places) };
  }
}

function genDecMulDiv() {
  var a = parseFloat((Math.random() * 100 + 0.5).toFixed(1));
  var b = parseFloat((Math.random() * 10 + 0.5).toFixed(1));
  if (Math.random() < 0.5) {
    return { html: a + ' x ' + b + ' =', answer: (a * b).toFixed(2) };
  } else {
    var c = parseFloat((a * b).toFixed(2));
    return { html: c + ' / ' + b + ' =', answer: a.toFixed(1) };
  }
}

function fracAns(n1, d1, n2, d2, op) {
  var an, ad;
  if (op === '+') { an = n1 * d2 + n2 * d1; ad = d1 * d2; }
  else if (op === '-') { an = n1 * d2 - n2 * d1; ad = d1 * d2; }
  else if (op === '×') { an = n1 * n2; ad = d1 * d2; }
  else if (op === '÷') { an = n1 * d2; ad = d1 * n2; }
  if (!an || an <= 0 || ad <= 0) return null;
  var g = gcd(Math.abs(an), ad);
  an /= g; ad /= g;
  if (ad === 1) return '' + an;
  if (an > ad) return (an / ad >> 0) + ' ' + (an % ad) + '/' + ad;
  return an + '/' + ad;
}

function genSimpleFrac() {
  var f1 = properFrac(10), f2 = properFrac(10);
  if (Math.random() < 0.5) {
    return { html: fmtFrac(f1.n, f1.d) + ' + ' + fmtFrac(f2.n, f2.d) + ' =', answer: fracAns(f1.n, f1.d, f2.n, f2.d, '+') };
  } else {
    if (f1.n * f2.d < f2.n * f1.d) {
      return { html: fmtFrac(f2.n, f2.d) + ' - ' + fmtFrac(f1.n, f1.d) + ' =', answer: fracAns(f2.n, f2.d, f1.n, f1.d, '-') };
    }
    return { html: fmtFrac(f1.n, f1.d) + ' - ' + fmtFrac(f2.n, f2.d) + ' =', answer: fracAns(f1.n, f1.d, f2.n, f2.d, '-') };
  }
}

function genFracArith(ops) {
  var f1 = properFrac(12), f2 = properFrac(12);
  var op = ops.charAt(rand(0, ops.length - 1));
  if (op === '-') {
    if (f1.n * f2.d < f2.n * f1.d) {
      return { html: fmtFrac(f2.n, f2.d) + ' - ' + fmtFrac(f1.n, f1.d) + ' =', answer: fracAns(f2.n, f2.d, f1.n, f1.d, '-') };
    }
    return { html: fmtFrac(f1.n, f1.d) + ' - ' + fmtFrac(f2.n, f2.d) + ' =', answer: fracAns(f1.n, f1.d, f2.n, f2.d, '-') };
  }
  return { html: fmtFrac(f1.n, f1.d) + ' ' + op + ' ' + fmtFrac(f2.n, f2.d) + ' =', answer: fracAns(f1.n, f1.d, f2.n, f2.d, op) };
}

function genEquation(maxN) {
  var x = rand(1, maxN), c = rand(1, maxN), r = Math.random();

  // x + c = d
  if (r < 0.12) return { html: 'x + ' + c + ' = ' + (x + c), answer: x };

  // c + x = d
  if (r < 0.22) return { html: c + ' + x = ' + (c + x), answer: x };

  // x - c = d   (x = d + c, 需要 x > c)
  if (r < 0.37) {
    var diff = x;  // 差
    return { html: 'x - ' + c + ' = ' + diff, answer: diff + c };
  }

  // c - x = d   (x = c - d)
  if (r < 0.50) {
    var m = rand(2, maxN * 2);
    var diff = rand(1, m - 1);
    return { html: m + ' - x = ' + diff, answer: m - diff };
  }

  // x + x = d
  if (r < 0.57) return { html: 'x + x = ' + (2 * x), answer: x };

  // dx = e
  if (r < 0.66) {
    var d = rand(2, 9);
    return { html: d + 'x = ' + (d * x), answer: x };
  }

  // x ÷ d = e   (x = e × d)
  if (r < 0.74) {
    var d = rand(2, 5);
    var e = rand(1, Math.floor(maxN * 2 / d));
    return { html: 'x ÷ ' + d + ' = ' + e, answer: d * e };
  }

  // dx + c = e   (两步：先减后除)
  if (r < 0.83) {
    var d = rand(2, 4);
    var c2 = rand(1, 5);
    return { html: d + 'x + ' + c2 + ' = ' + (d * x + c2), answer: x };
  }

  // dx - c = e   (两步，保证 dx > c)
  var d = rand(2, 4);
  var c2 = rand(1, Math.max(1, d * x - 1));
  return { html: d + 'x - ' + c2 + ' = ' + (d * x - c2), answer: x };
}

function genPercent() {
  var a = rand(1, 100), p = rand(5, 95), r = rand(0, 3);
  if (r === 0) {
    var v = a * p / 100;
    return { html: a + ' 的 ' + p + '% 是多少？', answer: (v % 1 === 0 ? v : v.toFixed(2)) };
  }
  if (r === 1) {
    var n = rand(1, 50), d = rand(50, 100);
    return { html: '把 ' + n + '/' + d + ' 化成百分数？', answer: (n / d * 100).toFixed(1) + '%' };
  }
  if (r === 2) {
    var vv = Math.round(a * p / 100);
    return { html: '一个数的 ' + p + '% 是 ' + vv + '，求这个数？', answer: (vv / p * 100).toFixed(1) };
  }
  var discount = rand(1, 9);
  return { html: '原价 ' + (a * 10) + ' 元，打 ' + discount + ' 折，现价？', answer: (a * discount) + '元' };
}

function genRatio() {
  var a = rand(2, 20), b = rand(2, 20);
  var g = gcd(a, b);
  var r = rand(0, 2);
  if (r === 0) return { html: a + ' : ' + b + ' 化简比？', answer: (a/g) + ':' + (b/g) };
  if (r === 1) return { html: '求比值 ' + a + ' : ' + b, answer: (a / b).toFixed(2) };
  return { html: a + ' : ' + b + ' = ' + (a/g) + ' : ?', answer: b/g };
}

// ============ UI ============

var currentGrade = 5;
var currentCount = 80;
var currentPages = 1;
var activeTypes = {};

function initUI() {
  for (var g = 1; g <= 6; g++) {
    activeTypes[g] = typeDefs[g].map(function(t) { return t.id; });
  }
  loadPrefs();

  var gb = document.getElementById('gradeBtns');
  for (var i = 1; i <= 6; i++) {
    var btn = document.createElement('button');
    btn.className = 'grade-btn' + (i === currentGrade ? ' active' : '');
    btn.textContent = typeNames[i];
    btn.setAttribute('data-grade', i);
    btn.onclick = (function(g) { return function() { selectGrade(g); }; })(i);
    gb.appendChild(btn);
  }

  document.querySelectorAll('.count-btn').forEach(function(btn) {
    btn.onclick = function() {
      document.querySelectorAll('.count-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      currentCount = parseInt(this.getAttribute('data-count'));
      document.getElementById('countInput').value = currentCount;
      generate();
    };
  });
  document.getElementById('countInput').onchange = function() {
    var v = parseInt(this.value) || 80;
    currentCount = Math.max(10, Math.min(200, v));
    this.value = currentCount;
    document.querySelectorAll('.count-btn').forEach(function(b) { b.classList.remove('active'); });
    generate();
  };

  document.querySelectorAll('.page-btn').forEach(function(btn) {
    btn.onclick = function() {
      document.querySelectorAll('.page-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      currentPages = parseInt(this.getAttribute('data-pages'));
      generate();
    };
  });

  document.getElementById('countInput').value = currentCount;
  document.querySelectorAll('.count-btn').forEach(function(btn) {
    btn.classList.toggle('active', parseInt(btn.getAttribute('data-count')) === currentCount);
  });
  document.querySelectorAll('.page-btn').forEach(function(btn) {
    btn.classList.toggle('active', parseInt(btn.getAttribute('data-pages')) === currentPages);
  });

  renderTypes();
  generate();
}

function selectGrade(g) {
  currentGrade = g;
  document.querySelectorAll('.grade-btn').forEach(function(b) {
    b.classList.toggle('active', parseInt(b.getAttribute('data-grade')) === g);
  });
  renderTypes();
  generate();
}

function renderTypes() {
  var container = document.getElementById('typesContainer');
  container.innerHTML = '';
  typeDefs[currentGrade].forEach(function(t) {
    var btn = document.createElement('button');
    btn.className = 'type-btn' + (activeTypes[currentGrade].indexOf(t.id) >= 0 ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = function() {
      var idx = activeTypes[currentGrade].indexOf(t.id);
      if (idx >= 0) {
        if (activeTypes[currentGrade].length === 1) return;
        activeTypes[currentGrade].splice(idx, 1);
      } else {
        activeTypes[currentGrade].push(t.id);
      }
      this.classList.toggle('active');
      generate();
    };
    container.appendChild(btn);
  });
}

function getSelectedTypes() {
  return typeDefs[currentGrade].filter(function(t) {
    return activeTypes[currentGrade].indexOf(t.id) >= 0;
  });
}

// ============ 生成多页 ============

function generate() {
  var types = getSelectedTypes();
  var perPage = currentCount;
  var pages = currentPages;
  var title = typeNames[currentGrade] + ' 口算练习题';

  if (types.length === 0) {
    document.getElementById('paperContainer').innerHTML =
      '<div class="no-questions" style="padding:60px;text-align:center;">请至少选择一种题型</div>';
    return;
  }

  var hasWideType = types.some(function(t) {
    return /(f|p|r|eq|dec|dm|mix|c$)/.test(t.id);
  });

  var cols, fontSize;
  if (perPage <= 30) { cols = 4; fontSize = '20px'; }
  else if (perPage <= 50) { cols = 4; fontSize = '18px'; }
  else if (perPage <= 80) {
    if (hasWideType) { cols = 4; fontSize = '14px'; }
    else { cols = 5; fontSize = '16px'; }
  } else {
    if (hasWideType) { cols = 4; fontSize = '13px'; }
    else { cols = 5; fontSize = '14.5px'; }
  }

  var container = document.getElementById('paperContainer');
  container.innerHTML = '';

  for (var p = 0; p < pages; p++) {
    var raw = [];
    for (var i = 0; i < perPage; i++) {
      var t = types[i % types.length];
      raw.push(t.gen());
    }
    shuffle(raw);

    var paper = document.createElement('div');
    paper.className = 'paper' + (p < pages - 1 ? ' paper-page' : '') + (hasWideType ? ' compact' : '');

    var headerHTML =
      '<div class="paper-header">' +
        '<span class="page-num">第 ' + (p+1) + ' 页</span>' +
        '<h2>' + title + '</h2>' +
        '<div class="paper-meta">' +
          '<span>姓名: <span class="blank"></span></span>' +
          '<span>日期: <span class="blank"></span></span>' +
          '<span>用时: <span class="blank"></span></span>' +
          '<span>对题: <span class="blank"></span></span>' +
        '</div>' +
      '</div>';

    var grid = document.createElement('div');
    grid.className = 'questions cols-' + cols;
    grid.style.fontSize = fontSize;

    raw.forEach(function(item, idx) {
      var qDiv = document.createElement('div');
      qDiv.className = 'question';
      qDiv.innerHTML = '<span class="idx">' + (idx+1) + '.</span><span class="q-text">' + item.html + '</span>';
      grid.appendChild(qDiv);
    });

    paper.innerHTML = headerHTML;
    paper.appendChild(grid);
    container.appendChild(paper);
  }
}

// ============ 偏好持久化 ============

function savePrefs() {
  try {
    var data = {
      grade: currentGrade,
      count: currentCount,
      pages: currentPages,
      types: activeTypes
    };
    localStorage.setItem('oralMath_prefs', JSON.stringify(data));
  } catch(e) {}
}

function loadPrefs() {
  try {
    var raw = localStorage.getItem('oralMath_prefs');
    if (!raw) return;
    var data = JSON.parse(raw);
    if (data.grade >= 1 && data.grade <= 6) currentGrade = data.grade;
    if (data.count) currentCount = Math.max(10, Math.min(200, data.count));
    if (data.pages) currentPages = data.pages;
    if (data.types) activeTypes = data.types;
  } catch(e) {}
}

var _origGenerate = generate;
generate = function() {
  _origGenerate();
  savePrefs();
};

initUI();
</script>
