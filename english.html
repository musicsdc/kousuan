<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语默写打印</title>
<link rel="stylesheet" href="styles/common.css">
<style>
  :root {
    --accent: #4A90D9;
    --accent-hover: #5BA0E9;
  }

  .btn-gen:hover { box-shadow: 0 4px 16px rgba(74, 144, 217, 0.35); }

  /* ── 信息条 ── */
  .summary-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 20px;
    box-shadow: var(--shadow);
    flex: 1;
  }
  .summary-bar .stats {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .summary-bar .stat-item {
    font-size: 13px;
    color: var(--ink-light);
  }
  .summary-bar .stat-item strong {
    color: var(--accent);
    font-size: 18px;
    font-weight: 700;
    margin-right: 4px;
  }

  /* ── 默写纸：2列 × 25行 = 50题/页 ── */
  .words {
    display: grid !important;
    grid-template-columns: repeat(2, 1fr);
    gap: 0 4px;
  }
  .word-item {
    padding: 8px 4px 4px 4px;
    border-bottom: 1px dashed var(--border);
    display: flex;
    align-items: flex-end;
    gap: 6px;
    font-size: 14px;
    color: var(--ink);
    min-height: 44px;
  }
  .word-item .idx {
    width: 28px;
    display: inline-flex;
    justify-content: flex-end;
    font-size: 11px;
    color: var(--ink-light);
    flex-shrink: 0;
    align-self: flex-end;
    padding-bottom: 4px;
  }
  .word-item .prompt {
    flex: 0 0 auto;
    width: 160px;
    line-height: 1.3;
    word-break: break-word;
    font-size: 13px;
    font-weight: 600;
    align-self: center;
  }
  .word-item .prompt.long {
    font-size: 11px;
    font-weight: 600;
  }
  .word-item .blank-line {
    flex: 1;
    border-bottom: 1px solid var(--ink);
    height: 1px;
    margin-left: 4px;
    margin-bottom: 4px;
  }
  /* 单元分隔标题（横跨两列） */
  .unit-divider {
    grid-column: 1 / -1;
    margin: 14px 0 6px;
    padding: 4px 0 6px;
    border-bottom: 1.5px solid var(--accent);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  .unit-divider:first-child {
    margin-top: 0;
  }

  /* ── 册别切换 ── */
  .semester-btns { display: flex; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .semester-btn {
    padding: 7px 18px; border: none; border-right: 1px solid var(--border);
    background: var(--card); font-size: 13px; font-weight: 500;
    color: var(--ink); cursor: pointer; transition: all 0.15s;
    font-family: inherit;
  }
  .semester-btn:last-child { border-right: none; }
  .semester-btn:hover { background: var(--paper); }
  .semester-btn.active { background: var(--accent); color: #FFFFFF; }

  /* ── 模式切换 ── */
  .mode-btns { display: flex; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .mode-btn {
    padding: 7px 16px; border: none; border-right: 1px solid var(--border);
    background: var(--card); font-size: 13px; font-weight: 500;
    color: var(--ink); cursor: pointer; transition: all 0.15s;
    font-family: inherit;
  }
  .mode-btn:last-child { border-right: none; }
  .mode-btn:hover { background: var(--paper); }
  .mode-btn.active { background: var(--accent); color: #FFFFFF; }

  /* ── 单元选择 ── */
  .units-grid { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .select-all-btn {
    padding: 6px 12px; border: 1px dashed var(--border); border-radius: 20px;
    background: transparent; font-size: 12px; color: var(--ink-light);
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .select-all-btn:hover { border-color: var(--accent); color: var(--accent); }

  .no-words { text-align: center; color: var(--ink-light); padding: 60px 0; }

  @media print {
    .summary-bar, .controls, .header { display: none !important; }
    .paper {
      background: #ffffff !important;
      box-shadow: none !important;
      border-radius: 0;
      padding: 16px 20px;
      margin: 0;
      border: none;
      height: 267mm;
      width: 210mm;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      page-break-after: always;
    }
    .paper:last-child { page-break-after: auto; }
    .paper-header { margin-bottom: 10px; padding-bottom: 8px; }
    .paper-header h2 { font-size: 18px; color: #000000 !important; font-weight: 800; }
    .paper-meta { font-size: 12px; gap: 14px; color: #333333 !important; font-weight: 500 !important; }
    .word-item {
      border-bottom: 1px solid #aaaaaa !important;
      break-inside: avoid;
      padding: 8px 3px 4px 3px;
      min-height: 40px;
      font-size: 13px !important;
      color: #000000 !important;
      font-weight: 400 !important;
      font-family: 'Segoe UI', 'Arial', 'PingFang SC', sans-serif !important;
      display: flex !important;
      align-items: flex-end !important;
      gap: 6px !important;
    }
    .word-item .idx {
      color: #333333 !important;
      font-weight: 500 !important;
      align-self: flex-end !important;
      padding-bottom: 4px !important;
    }
    .word-item .prompt {
      font-size: 12px !important;
      width: 150px !important;
      font-weight: 600 !important;
      align-self: center !important;
    }
    .word-item .prompt.long { font-size: 11px !important; font-weight: 600 !important; }
    .word-item .blank-line {
      border-bottom: 1px solid #000 !important;
      flex: 1 !important;
      height: 1px !important;
      margin-left: 4px !important;
      margin-bottom: 4px !important;
    }
    .words { flex: 1; align-content: start; display: grid !important; gap: 0 4px !important; }
    .unit-divider {
      border-bottom: 1.5px solid #000 !important;
      color: #000 !important;
      font-size: 12px;
      margin: 10px 0 4px;
      padding: 2px 0 4px;
    }
    .unit-divider:first-child { margin-top: 0; }
  }

  @media (max-width: 700px) {
    .header { padding: 20px; flex-direction: column; text-align: center; gap: 10px; }
    .controls { padding: 16px; }
    .controls-row .control-group { width: 100%; }
    .actions .btn { flex: 1; text-align: center; }
    .print-tip { max-width: none; white-space: normal; }
    .paper { padding: 12px 8px; overflow: hidden; }
    .words { gap: 0 12px; }
    .word-item .prompt { width: 100px; font-size: 12px; }
    .word-item .prompt.long { font-size: 11px; }
    .top-nav { justify-content: center; }
    .summary-bar .stats { gap: 12px; }
  }
    .top-nav { justify-content: center; }
    .word-item {
      font-size: 12px; padding: 4px 0 2px 0; min-height: 38px; gap: 2px;
      min-width: 0; overflow: hidden;
    }
    .word-item .idx { width: 24px; font-size: 10px; flex-shrink: 0; padding-bottom: 4px; }
    .word-item .prompt {
      width: 140px; font-size: 12px; word-break: break-word;
      line-height: 1.3; font-weight: 600;
    }
    .word-item .prompt.long { font-size: 11px; }
    .word-item .blank-line {
      flex: 1; border-bottom: 1px solid var(--ink);
      margin-left: 4px; margin-bottom: 4px;
    }
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div>
      <h1>英语默写</h1>
      <p>选择年级与单元，一键生成可打印的英语默写纸</p>
      <p style="font-size:12px;color:var(--ink-light);margin-top:2px;">反馈建议 <a href="mailto:82127972@coze.email" style="color:var(--ink-light);">82127972@coze.email</a></p>
    </div>
    <div style="text-align:right;">
      <div class="top-nav">
        <a href="index.html">首页</a>
        <a href="kousuan.html">口算练习</a>
        <span class="current">英语默写</span>
        <a href="combo.html">精选套题</a>
      </div>
      <div class="header-badge">译林版</div>
    </div>
  </div>

  <div class="controls">
    <div class="controls-row">
      <div class="control-group">
        <label>年级</label>
        <div class="grade-btns" id="gradeBtns"></div>
      </div>
      <div class="control-group">
        <label>册别</label>
        <div class="semester-btns" id="semesterBtns"></div>
      </div>
      <div class="control-group" id="editionGroup" style="display:none;">
        <label>版本</label>
        <div class="mode-btns" id="editionBtns">
          <button class="mode-btn active" data-edition="">旧版</button>
          <button class="mode-btn" data-edition="new">新版</button>
        </div>
      </div>
    </div>
    <div class="controls-row">
      <div class="control-group">
        <label>模式</label>
        <div class="mode-btns" id="modeBtns"></div>
      </div>
    </div>
    <div class="controls-row">
      <div class="control-group" style="flex:1">
        <label>单元</label>
        <div class="units-grid" id="unitsGrid"></div>
      </div>
    </div>
    <div class="controls-row" id="summaryRow" style="display:none;">
      <div class="summary-bar">
        <div class="stats">
          <div class="stat-item">已选 <strong id="stat-units">0</strong> 单元</div>
          <div class="stat-item">共 <strong id="stat-words">0</strong> 词</div>
          <div class="stat-item">默写需 <strong id="stat-pages">0</strong> 张纸</div>
          <div class="stat-item">模式：<strong id="stat-mode">中→英</strong></div>
        </div>
      </div>
    </div>
    <div class="controls-row">
      <div class="actions">
        <button class="btn btn-gen" onclick="generate()">生成默写纸</button>
        <button class="btn btn-print" onclick="window.print()">打印 / PDF</button>
        <span class="print-tip">固定每页50题，按选中单元全部出题</span>
      </div>
    </div>
  </div>

  <div id="paperContainer">
    <div class="paper" id="paper">
      <div class="paper-header">
        <h2 id="paperTitle">英语默写纸</h2>
        <div class="paper-meta">
          <span>姓名: <span class="blank"></span></span>
          <span>日期: <span class="blank"></span></span>
          <span>用时: <span class="blank"></span></span>
          <span>对题: <span class="blank"></span></span>
        </div>
      </div>
      <div class="words cols-3" id="wordsContainer">
        <div class="no-words">请选择年级和单元，然后点击生成默写纸</div>
      </div>
    </div>
  </div>

</div>

<script src="js/wordbank.js"></script>
<script>
// ============ 状态 ============
var currentGrade = 3;
var currentSemester = 'A';
var currentEdition = '';  // 'new' or '' (old), only used for grade 5-6
var currentMode = 'zh2en';
var activeUnitIndices = [0];
var WORDS_PER_PAGE = 50;

// ============ 工具函数 ============
function getCurrentBook() {
  var key = currentGrade + currentSemester;
  if (currentEdition === 'new' && currentSemester === 'A' && (currentGrade === 5 || currentGrade === 6)) {
    var newKey = key + '-new';
    if (wordBank[newKey]) return wordBank[newKey];
  }
  return wordBank[key] || null;
}

function getSelectedWordsByUnit() {
  var book = getCurrentBook();
  if (!book) return [];
  var indices = activeUnitIndices;
  if (!indices || indices.length === 0) indices = book.units.map(function(_, i) { return i; });

  var result = [];
  indices.forEach(function(i) {
    if (i >= 0 && i < book.units.length) {
      result.push({
        unit: book.units[i].unit,
        words: book.units[i].words.slice()
      });
    }
  });
  return result;
}

// 更新统计信息
function updateSummary() {
  var units = getSelectedWordsByUnit();
  var totalWords = 0;
  units.forEach(function(u) { totalWords += u.words.length; });
  var pages = Math.ceil(totalWords / WORDS_PER_PAGE);

  document.getElementById('stat-units').textContent = units.length;
  document.getElementById('stat-words').textContent = totalWords;
  document.getElementById('stat-pages').textContent = pages;
  document.getElementById('stat-mode').textContent = currentMode === 'zh2en' ? '中→英' : '英→中';
  document.getElementById('summaryRow').style.display = units.length > 0 ? 'block' : 'none';
}

// ============ 生成 ============
function generate() {
  var book = getCurrentBook();
  var units = getSelectedWordsByUnit();

  if (!book || units.length === 0) {
    document.getElementById('paperContainer').innerHTML =
      '<div class="no-words" style="padding:60px;text-align:center;">请至少选择一个单元</div>';
    return;
  }

  updateSummary();

  // 把所有单元的词展平，加单元标记
  var allItems = [];
  units.forEach(function(u) {
    allItems.push({ type: 'unit', unit: u.unit });
    u.words.forEach(function(w) { allItems.push({ type: 'word', en: w.en, zh: w.zh }); });
  });

  // 按50题/页切分（单元分隔不计入题数）
  var pages = [];
  var currentPage = [];
  var wordCount = 0;

  allItems.forEach(function(it) {
    if (it.type === 'word') {
      if (wordCount === WORDS_PER_PAGE) {
        pages.push(currentPage);
        currentPage = [];
        wordCount = 0;
      }
      wordCount++;
    }
    currentPage.push(it);
  });
  if (currentPage.length > 0) pages.push(currentPage);

  var container = document.getElementById('paperContainer');
  container.innerHTML = '';

  var modeLabel = currentMode === 'zh2en' ? '中→英' : '英→中';
  var unitNames = units.map(function(u) { return u.unit; }).join('、');
  var title = book.label + ' 英语默写纸';

  var globalIdx = 0;

  for (var p = 0; p < pages.length; p++) {
    var paper = document.createElement('div');
    paper.className = 'paper' + (p < pages.length - 1 ? ' paper-page' : '');

    paper.innerHTML =
      '<div class="paper-header">' +
        '<span class="page-num">第 ' + (p+1) + ' / ' + pages.length + ' 页</span>' +
        '<h2>' + title + '</h2>' +
        '<div class="paper-meta">' +
          '<span>模式: ' + modeLabel + '</span>' +
          '<span>姓名: <span class="blank"></span></span>' +
          '<span>日期: <span class="blank"></span></span>' +
        '</div>' +
      '</div>';

    var grid = document.createElement('div');
    grid.className = 'words';

    pages[p].forEach(function(it) {
      if (it.type === 'unit') {
        var div = document.createElement('div');
        div.className = 'unit-divider';
        div.textContent = it.unit;
        grid.appendChild(div);
      } else {
        globalIdx++;
        var qDiv = document.createElement('div');
        qDiv.className = 'word-item';
        var promptText = currentMode === 'zh2en' ? it.zh : it.en;
        var promptCls = promptText.length > 8 ? 'prompt long' : 'prompt';
        qDiv.innerHTML =
          '<span class="idx">' + globalIdx + '.</span>' +
          '<span class="' + promptCls + '">' + promptText + '</span>' +
          '<span class="blank-line"></span>';
        grid.appendChild(qDiv);
      }
    });

    paper.appendChild(grid);
    container.appendChild(paper);
  }
}

// ============ UI 初始化 ============
function initUI() {
  // 年级按钮
  var gb = document.getElementById('gradeBtns');
  for (var g = 3; g <= 9; g++) {
    var btn = document.createElement('button');
    btn.className = 'grade-btn' + (g === currentGrade ? ' active' : '');
    btn.textContent = g + '年级';
    btn.setAttribute('data-grade', g);
    btn.onclick = (function(grade) { return function() { selectGrade(grade); }; })(g);
    gb.appendChild(btn);
  }

  // 册别按钮
  var sb = document.getElementById('semesterBtns');
  ['A', 'B'].forEach(function(sem) {
    var btn = document.createElement('button');
    btn.className = 'semester-btn' + (sem === currentSemester ? ' active' : '');
    btn.textContent = sem === 'A' ? '上册' : '下册';
    btn.setAttribute('data-semester', sem);
    btn.onclick = function() { selectSemester(sem); };
    sb.appendChild(btn);
  });

  // 版本切换按钮（5-6年级上册才有）
  document.querySelectorAll('#editionBtns .mode-btn').forEach(function(btn) {
    btn.onclick = function() {
      document.querySelectorAll('#editionBtns .mode-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      currentEdition = this.getAttribute('data-edition');
      renderUnits();
      generate();
      savePrefs();
    };
  });
  updateEditionVisibility();

  // 模式按钮
  var mb = document.getElementById('modeBtns');
  [
    { id: 'zh2en', label: '中 → 英' },
    { id: 'en2zh', label: '英 → 中' }
  ].forEach(function(m) {
    var btn = document.createElement('button');
    btn.className = 'mode-btn' + (m.id === currentMode ? ' active' : '');
    btn.textContent = m.label;
    btn.setAttribute('data-mode', m.id);
    btn.onclick = function() { selectMode(m.id); };
    mb.appendChild(btn);
  });

  // 初始渲染
  renderUnits();
  loadPrefs();
  generate();
  updateSummary();
}

function selectGrade(g) {
  currentGrade = g;
  document.querySelectorAll('.grade-btn').forEach(function(b) {
    b.classList.toggle('active', parseInt(b.getAttribute('data-grade')) === g);
  });
  updateEditionVisibility();
  activeUnitIndices = [0];
  renderUnits();
  generate();
  savePrefs();
}

function updateEditionVisibility() {
  var show = (currentGrade === 5 || currentGrade === 6) && currentSemester === 'A';
  var el = document.getElementById('editionGroup');
  if (show) {
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
    el.style.gap = '6px';
  } else {
    el.style.display = 'none';
    currentEdition = '';
  }
}

function selectSemester(sem) {
  currentSemester = sem;
  document.querySelectorAll('.semester-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-semester') === sem);
  });
  updateEditionVisibility();
  activeUnitIndices = [0];
  renderUnits();
  generate();
  savePrefs();
}

function selectMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-mode') === mode);
  });
  generate();
  savePrefs();
}

function renderUnits() {
  var grid = document.getElementById('unitsGrid');
  grid.innerHTML = '';

  var book = getCurrentBook();
  if (!book || !book.units || book.units.length === 0) {
    grid.textContent = '暂无数据';
    return;
  }

  // 全选/全不选
  var allBtn = document.createElement('button');
  allBtn.className = 'select-all-btn';
  var allSelected = !activeUnitIndices || activeUnitIndices.length === book.units.length;
  allBtn.textContent = allSelected ? '全不选' : '全选';
  allBtn.onclick = function() {
    if (!activeUnitIndices || activeUnitIndices.length === book.units.length) {
      activeUnitIndices = [];
    } else {
      activeUnitIndices = book.units.map(function(_, i) { return i; });
    }
    renderUnits();
    generate();
    savePrefs();
    updateSummary();
  };
  grid.appendChild(allBtn);

  // 各单元
  book.units.forEach(function(u, i) {
    var btn = document.createElement('button');
    var isActive = !activeUnitIndices || activeUnitIndices.indexOf(i) >= 0;
    btn.className = 'unit-btn' + (isActive ? ' active' : '');
    btn.textContent = u.unit + ' (' + u.words.length + '词)';
    btn.onclick = function() {
      if (!activeUnitIndices) {
        activeUnitIndices = book.units.map(function(_, j) { return j; });
      }
      var idx = activeUnitIndices.indexOf(i);
      if (idx >= 0) {
        if (activeUnitIndices.length === 1) return; // 至少保留一个单元
        activeUnitIndices.splice(idx, 1);
      } else {
        activeUnitIndices.push(i);
        activeUnitIndices.sort(function(a, b) { return a - b; });
      }
      renderUnits();
      generate();
      savePrefs();
      updateSummary();
    };
    grid.appendChild(btn);
  });
}

// ============ 偏好持久化 ============
function savePrefs() {
  try {
    var data = {
      grade: currentGrade,
      semester: currentSemester,
      edition: currentEdition,
      mode: currentMode,
      units: activeUnitIndices
    };
    localStorage.setItem('englishDictation_prefs', JSON.stringify(data));
  } catch(e) {}
}

function loadPrefs() {
  try {
    var raw = localStorage.getItem('englishDictation_prefs');
    if (!raw) return;
    var data = JSON.parse(raw);
    if (data.grade >= 3 && data.grade <= 9) currentGrade = data.grade;
    if (data.semester === 'A' || data.semester === 'B') currentSemester = data.semester;
    if (data.edition) currentEdition = data.edition;
    if (data.mode) currentMode = data.mode;
    if (data.units) activeUnitIndices = data.units;

    document.querySelectorAll('.grade-btn').forEach(function(b) {
      b.classList.toggle('active', parseInt(b.getAttribute('data-grade')) === currentGrade);
    });
    document.querySelectorAll('.semester-btn').forEach(function(b) {
      b.classList.toggle('active', b.getAttribute('data-semester') === currentSemester);
    });
    document.querySelectorAll('.mode-btn').forEach(function(b) {
      b.classList.toggle('active', b.getAttribute('data-mode') === currentMode);
    });
    document.getElementById('countInput').value = currentCount;
  } catch(e) {}
}

// 启动
initUI();
</script>
