<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>зӯ”жЎҲйЎө</title>
<style>
  :root { --ink: #3B3228; --ink-light: #8B7E6E; --border: #E6DDD0; --bg: #FDF5E8; --radius: 14px; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); padding: 20px; color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 1100px; margin: 0 auto; }

  .top-bar {
    background: #fff; border-radius: var(--radius); padding: 14px 24px;
    margin-bottom: 14px; display: flex; gap: 12px; align-items: center;
    box-shadow: 0 2px 12px rgba(60,40,20,0.06);
  }
  .top-bar a { color: #7B5BA8; text-decoration: none; font-size: 14px; font-weight: 500; }
  .btn {
    padding: 10px 24px; border: none; border-radius: 24px;
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn-gen { background: #7B5BA8; color: #fff; }
  .btn-print { background: var(--ink); color: #fff; }

  .paper {
    background: #fff; border-radius: var(--radius); padding: 20px 18px;
    box-shadow: 0 2px 12px rgba(60,40,20,0.06); margin-bottom: 16px;
  }
  .paper-header { text-align: center; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1.5px solid var(--ink); }
  .paper-header h2 { font-size: 17px; font-weight: 700; }
  .paper-header .page-num { float: right; font-size: 11px; color: var(--ink-light); }

  .questions { display: grid; gap: 3px 8px; }
  .questions.cols-5 { grid-template-columns: repeat(5, 1fr); }
  .question {
    padding: 4px 2px; border-bottom: 1px dashed var(--border);
    display: flex; align-items: baseline; gap: 3px;
    font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
    font-size: 12px; color: var(--ink);
  }
  .question .idx { width: 24px; font-size: 10px; color: var(--ink-light); flex-shrink: 0; text-align: right; font-family: 'PingFang SC','Microsoft YaHei',sans-serif; }
  .q-text { display: inline-flex; align-items: center; flex-wrap: wrap; }
  .frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; line-height: 1; margin: 0 2px; }
  .frac .num { padding: 1px 3px 0; border-bottom: 1.2px solid var(--ink); }
  .frac .den { padding: 0 3px 1px; }

  @media print {
    body { background: #fff; padding: 0; }
    .top-bar { display: none; }
    .paper { box-shadow: none; border-radius: 0; padding: 12px 16px; height: 267mm; width: 210mm; box-sizing: border-box; display: flex; flex-direction: column; page-break-after: always; break-after: page; }
    .paper:last-child { page-break-after: auto; }
    .paper-header { margin-bottom: 8px; }
    .paper-header h2 { font-size: 15px; color: #000 !important; }
    .question { border-bottom-color: #ccc !important; font-size: 11px !important; color: #000 !important; }
    .question .idx { color: #666 !important; }
    .questions { flex: 1; align-content: space-between; display: grid !important; gap: 0 4px !important; }
    .questions.cols-5 { grid-template-columns: repeat(5, 1fr) !important; }
    @page { margin: 6mm; size: A4 portrait; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <a href="index.html">вҶҗ йҰ–йЎө</a>
    <a href="combo.html">зІҫйҖүеҘ—йўҳ</a>
    <span style="flex:1"></span>
    <button class="btn btn-gen" onclick="generate()">йҮҚж–°з”ҹжҲҗ</button>
    <button class="btn btn-print" onclick="window.print()">жү“еҚ°</button>
  </div>
  <div id="paperContainer"></div>
</div>

<script>
// ============ е·Ҙе…·еҮҪж•° ============
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function gcd(a,b){return b?gcd(b,a%b):a;}
function shuffle(arr){for(var i=arr.length-1;i>0;i--){var j=rand(0,i),t=arr[i];arr[i]=arr[j];arr[j]=t;}return arr;}
function fracHTML(n,d){return'<span class="frac"><span class="num">'+n+'</span><span class="den">'+d+'</span></span>';}
function chainFrac(n,d){return fracHTML(n,d);}
function chainAns(n,d){var g=gcd(n,d);n/=g;d/=g;if(d===1)return''+n;return n+'/'+d;}
function pickCoprime(den,min,max){for(var i=0;i<200;i++){var n=rand(min,max);if(gcd(n,den)===1&&n!==den)return n;}var p=[2,3,5,7,11,13,17,19,23];for(var j=0;j<p.length;j++){if(p[j]!==den&&gcd(p[j],den)===1)return p[j];}return den+1;}
function ansHTML(a){if(!a)return'';var p=a.split('/');if(p.length===1)return a;return fracHTML(p[0],p[1]);}

// ============ з”ҹжҲҗеҷЁ ============
function genAddSubSameDen(){for(var i=0;i<100;i++){var d=rand(3,12),m=Math.random()<0.7?d-1:d+Math.floor(d*0.6),n1=pickCoprime(d,1,Math.max(2,m));m=Math.random()<0.7?d-1:d+Math.floor(d*0.6);var n2=pickCoprime(d,1,Math.max(2,m));if(Math.random()<0.5){var tn=n1+n2;if(tn>30)continue;return{html:chainFrac(n1,d)+' + '+chainFrac(n2,d)+' =',ans:chainAns(tn,d)};}else{if(n1<n2){var t=n1;n1=n2;n2=t;}return{html:chainFrac(n1,d)+' - '+chainFrac(n2,d)+' =',ans:chainAns(n1-n2,d)};}}return{html:chainFrac(3,4)+' + '+chainFrac(1,4)+' =',ans:'1'};}
function genAddSubDiffDen(){for(var i=0;i<100;i++){var d1=rand(2,10),d2=rand(2,10);if(d1===d2)continue;var m1=Math.random()<0.7?d1-1:d1+Math.floor(d1*0.6),m2=Math.random()<0.7?d2-1:d2+Math.floor(d2*0.6),n1=pickCoprime(d1,1,Math.max(2,m1)),n2=pickCoprime(d2,1,Math.max(2,m2)),lcm=d1*d2/gcd(d1,d2),mm1=lcm/d1,mm2=lcm/d2;if(Math.random()<0.5){return{html:chainFrac(n1,d1)+' + '+chainFrac(n2,d2)+' =',ans:chainAns(n1*mm1+n2*mm2,lcm)};}else{if(n1*mm1<n2*mm2){var t=n1;n1=n2;n2=t;t=d1;d1=d2;d2=t;t=mm1;mm1=mm2;mm2=t;}return{html:chainFrac(n1,d1)+' - '+chainFrac(n2,d2)+' =',ans:chainAns(n1*mm1-n2*mm2,lcm)};}}return{html:chainFrac(2,3)+' + '+chainFrac(1,4)+' =',ans:'11/12'};}
function genAddSubCol(){return Math.random()<0.1?genAddSubSameDen():genAddSubDiffDen();}
function genMul2Col(){return Math.random()<0.3?genFracTimesInt():genFracTimesFrac();}
function genFracTimesInt(){for(var i=0;i<100;i++){var b=rand(2,10),a=pickCoprime(b,1,b*2),k;if(Math.random()<0.9){var fs=[];for(var f=2;f<=b;f++)if(b%f===0)fs.push(f);k=fs[rand(0,fs.length-1)]*rand(1,Math.floor(15/(fs[0]||2)));}else k=pickCoprime(b,2,15);var tn=a*k,td=b;if(tn>50)continue;return{html:chainFrac(a,b)+' Г— '+k+' =',ans:chainAns(tn,td)};}return{html:chainFrac(2,3)+' Г— 6 =',ans:'4'};}
function genFracTimesFrac(){for(var i=0;i<100;i++){var b=rand(2,10),d=rand(2,10),a=pickCoprime(b,1,12),c=pickCoprime(d,1,12),hc=gcd(a,d)>1||gcd(b,c)>1;if(Math.random()<0.9&&!hc)continue;if(Math.random()>=0.9&&hc)continue;var tn=a*c,td=b*d,g=gcd(tn,td);return{html:chainFrac(a,b)+' Г— '+chainFrac(c,d)+' =',ans:chainAns(tn/g,td/g)};}return{html:chainFrac(3,4)+' Г— '+chainFrac(8,9)+' =',ans:'2/3'};}
function genMul3Col(){return Math.random()<0.3?genFracIntFrac():gen3Frac();}
function gen3Frac(){for(var i=0;i<100;i++){var b=rand(2,10),a=pickCoprime(b,1,12),c=pickCoprime(b,2,10),d=pickCoprime(c,2,12);return{html:chainFrac(a,b)+' Г— '+chainFrac(b,c)+' Г— '+chainFrac(c,d)+' =',ans:chainAns(a,d)};}return{html:chainFrac(1,2)+' Г— '+chainFrac(2,3)+' Г— '+chainFrac(3,4)+' =',ans:'1/4'};}
function genFracIntFrac(){for(var i=0;i<100;i++){var b=rand(2,10),d=rand(2,10),a=pickCoprime(b,1,12),c=pickCoprime(d,1,12),k=rand(2,8),tn=a*k*c,td=b*d;if(tn>200)continue;var g=gcd(tn,td);return{html:chainFrac(a,b)+' Г— '+k+' Г— '+chainFrac(c,d)+' =',ans:chainAns(tn/g,td/g)};}return{html:chainFrac(4,7)+' Г— 3 Г— '+chainFrac(7,8)+' =',ans:'3/2'};}

// ============ з”ҹжҲҗ ============
function generate(){
  var container=document.getElementById('paperContainer');
  container.innerHTML='';

  // е’Ң combo дёҖж ·зҡ„еҲ—з”ҹжҲҗеҷЁ
  var cols=[genAddSubCol,genAddSubCol,genMul2Col,genMul3Col,genMul3Col];
  var allQA=[];

  // з”ҹжҲҗ 100 йўҳ
  for(var r=0;r<20;r++){
    var row=[];
    for(var c=0;c<5;c++) row.push(cols[c]());
    allQA.push(row);
  }

  // === з¬¬1йЎөпјҡзәҜйўҳзӣ® ===
  var p1=document.createElement('div');
  p1.className='paper';
  p1.innerHTML='<div class="paper-header"><h2>дә”е№ҙзә§еҲҶж•°зү№и®ӯ В· з»ғд№ </h2></div>';
  var g1=document.createElement('div');
  g1.className='questions cols-5';
  for(var r=0;r<20;r++){
    for(var c=0;c<5;c++){
      var q=allQA[r][c];
      var d=document.createElement('div');
      d.className='question';
      d.innerHTML='<span class="idx">'+(r*5+c+1)+'.</span><span class="q-text">'+q.html+'</span>';
      g1.appendChild(d);
    }
  }
  p1.appendChild(g1);
  container.appendChild(p1);

  // === з¬¬2йЎөпјҡйўҳзӣ®+зӯ”жЎҲ ===
  var p2=document.createElement('div');
  p2.className='paper';
  p2.innerHTML='<div class="paper-header"><h2>дә”е№ҙзә§еҲҶж•°зү№и®ӯ В· зӯ”жЎҲ</h2></div>';
  var g2=document.createElement('div');
  g2.className='questions cols-5';
  for(var r=0;r<20;r++){
    for(var c=0;c<5;c++){
      var q=allQA[r][c];
      var d=document.createElement('div');
      d.className='question';
      d.innerHTML='<span class="idx">'+(r*5+c+1)+'.</span><span class="q-text">'+q.html.replace(' =',' = ')+'<b>'+ansHTML(q.ans)+'</b></span>';
      g2.appendChild(d);
    }
  }
  p2.appendChild(g2);
  container.appendChild(p2);
}

generate();
</script>
</body>
</html>
